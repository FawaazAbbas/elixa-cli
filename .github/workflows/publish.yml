name: Publish to PyPI

# Publishes `elixa` to PyPI whenever a tag matching `v*` is pushed.
# Example: `git tag v0.2.0 && git push origin v0.2.0` releases 0.2.0.
#
# Uses PyPI's Trusted Publishing (OIDC) — no long-lived API token in repo
# secrets. One-time setup at https://pypi.org/manage/account/publishing/
# with:
#   Project name:  elixa
#   Owner:         FawaazAbbas
#   Repository:    elixa-cli
#   Workflow:      publish.yml
#   Environment:   pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, skip upload"
        required: false
        default: "false"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Show distributions
        run: ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/elixa
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
